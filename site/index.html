<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project KB Template</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RXPMRGHE8E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-RXPMRGHE8E');
    </script>
    <meta http-equiv="refresh" content="0; url=./landing/" />
    <script>
      if (window.gtag) {
        gtag('event', 'entry_redirect', {
          event_category: 'navigation',
          event_label: 'site_root_to_landing',
          destination: './landing/'
        });
      }
      setTimeout(function () {
        window.location.replace('./landing/');
      }, 120);
    </script>
  </head>
  <body>
    <p>Redirecting to landing page...</p>
    <p><a href="./landing/">Open landing page</a></p>
    <p><a href="./docs/">Open docs</a></p>
  </body>
</html>
