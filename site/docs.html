    <script>
      (function highlightActiveNav() {
        const navLinks = document.querySelectorAll('.top-nav nav a');
        const currentPath = window.location.pathname;
        const currentDoc = new URLSearchParams(window.location.search).get('doc');
        
        navLinks.forEach(link => {
          const href = link.getAttribute('href');
          
            if ((href === './docs.html' && currentPath.endsWith('/docs.html') && !currentDoc) ||
              (href.includes('?doc=') && currentDoc && href.includes(currentDoc))) {
            link.classList.add('nav-active');
          } else {
            link.classList.remove('nav-active');
          }
        });
      })();
    </script>
