<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Test Case Catalog</title>
    <meta name="description" content="Test-case registry for MCP success criteria and regression runs." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/shared.css" />
    <link rel="stylesheet" href="./css/catalog.css" />
  </head>
  <body data-source="./data/test-cases.json" data-mode="tests">
    <div class="mesh" aria-hidden="true"></div>
    <header class="top-nav">
      <a href="./" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-copy">
          <span class="brand-name">KB Template</span>
          <span class="brand-tag">MCP Test Cases</span>
        </span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span>Menu</span>
      </button>
      <nav>
        <a href="./docs.html"><span>Docs</span></a>
        <a href="./features.html"><span>Features</span></a>
        <a href="./cli-commands.html"><span>CLI</span></a>
        <a class="nav-active" href="./test-cases.html"><span>Test Cases</span></a>
      </nav>
    </header>

    <main class="catalog-main">
      <section class="catalog-hero">
        <h1>Test Case Catalog</h1>
        <p>Noi luu danh sach test case de chay lai sau moi dot nang cap MCP hoac multi-agent orchestration.</p>
        <div class="catalog-meta">
          <span>Updated: <strong id="catalogUpdated">-</strong></span>
          <span>Visible test cases: <strong id="catalogCount">0</strong></span>
        </div>
      </section>

      <div class="catalog-toolbar">
        <input id="catalogSearch" type="search" placeholder="Search id, level, target repo, status..." />
      </div>

      <section id="catalogList" class="catalog-grid"></section>
    </main>

    <footer>
      <p class="footer-line"><span>KB test-first catalogs</span></p>
    </footer>

    <script src="./js/catalog-page.js"></script>
    <script>
      (function () {
        var toggle = document.querySelector('.nav-toggle');
        var header = document.querySelector('.top-nav');
        if (!toggle || !header) return;
        toggle.addEventListener('click', function () {
          var open = header.classList.toggle('nav-open');
          toggle.setAttribute('aria-expanded', String(open));
        });
      })();
    </script>
  </body>
</html>
